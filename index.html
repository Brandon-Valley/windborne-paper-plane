<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"><title>Windborne Sky Run</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#071426;color:white;font-family:system-ui,Arial;touch-action:none;user-select:none}canvas{position:fixed;inset:0;width:100%;height:100%}.ui{position:fixed;z-index:3}.hide{display:none!important}.top{top:10px;left:10px;right:10px;display:flex;justify-content:space-between;pointer-events:none}.pill{background:#071426cc;border:1px solid #fff4;border-radius:999px;padding:8px 11px;font-weight:900;box-shadow:0 8px 25px #0008}.pill small{display:block;color:#c7dcef;font-size:11px}.bar{width:130px;height:10px;background:#fff2;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#70f0c8,#ffd36a,#ff7a70)}.screen{position:fixed;inset:0;display:grid;place-items:center;z-index:9;background:radial-gradient(circle at top,#2588c855,#071426ee 55%,#000);padding:18px}.card{max-width:560px;text-align:center;background:#092044e8;border:1px solid #fff3;border-radius:26px;padding:20px;box-shadow:0 22px 80px #000b}h1{font-size:clamp(42px,13vw,68px);margin:4px 0 10px;letter-spacing:-.08em;line-height:.9}p{color:#c7dcef;font-weight:650;line-height:1.4}button{border:0;border-radius:16px;padding:13px 15px;margin:5px;min-width:150px;background:linear-gradient(#fff2b8,#ffd36a);color:#071426;font-weight:950}.secondary{background:#ffffff1e;color:#fff;border:1px solid #fff3}.choice.on{background:linear-gradient(#bfffee,#70f0c8);color:#071426}.pad{bottom:calc(18px + env(safe-area-inset-bottom,0));width:72px;height:72px;border-radius:22px;min-width:0;padding:0;background:#071426c0;color:#fff;border:1px solid #fff4;font-size:32px}.left{left:16px}.right{left:96px}.gust{right:16px;width:88px;height:88px;border-radius:50%;font-size:13px}.toast{left:50%;bottom:112px;transform:translateX(-50%);opacity:0;background:#071426e8;border:1px solid #fff3;border-radius:999px;padding:10px 14px;font-weight:900}.toast.on{opacity:1}@media(max-width:430px){button{width:100%;margin:5px 0}.choice{width:auto!important}.card{padding:18px 15px}}</style></head><body><canvas id="cv"></canvas><div id="hud" class="ui top hide"><div class="pill"><span id="score">0</span> pts<small id="life">3 folds</small></div><div class="pill"><span id="modeTxt">Fingers</span><small id="windTxt">calm</small><div class="bar"><i id="windBar"></i></div></div></div><button id="left" class="ui pad left hide">‹</button><button id="right" class="ui pad right hide">›</button><button id="gust" class="ui pad gust hide">GUST<br>hold</button><div id="toast" class="ui toast"></div><div id="menu" class="screen"><div class="card"><h1>Windborne</h1><h2>Sky Run</h2><p>Practice is safe: rings only, no rain clouds. Pick a control mode before flying.</p><button id="finger" class="secondary choice">Fingers Only</button><button id="blow" class="secondary choice">Blow + Fingers</button><button id="tilt" class="secondary choice">Tilt Phone</button><button id="start">Start Flight</button><button id="practice" class="secondary">Practice</button><button id="mic" class="secondary">Enable Mic</button><p>Best: <b id="best">0</b></p></div></div><div id="over" class="screen hide"><div class="card"><h1 id="final">0</h1><p id="summary">Flight ended.</p><button id="again">Fly Again</button><button id="prac2" class="secondary">Practice</button><button id="home" class="secondary">Menu</button></div></div><script>(()=>{'use strict';const $=id=>document.getElementById(id),c=$('cv'),x=c.getContext('2d'),E={hud:$('hud'),score:$('score'),life:$('life'),modeTxt:$('modeTxt'),windTxt:$('windTxt'),windBar:$('windBar'),menu:$('menu'),over:$('over'),toast:$('toast'),best:$('best'),final:$('final'),summary:$('summary'),left:$('left'),right:$('right'),gust:$('gust'),finger:$('finger'),blow:$('blow'),tilt:$('tilt'),mic:$('mic')};let W,H,D,S,last=0,t=0,state='menu',ctrl=localStorage.wbCtrl||'finger',best=+localStorage.wbBest3||0,score=0,lives=3,level=1,spawnO=0,spawnR=0,shown=0,stars=[],bg=[],obs=[],rings=[],bits=[];const P={x:0,y:0,vx:0,a:0,inv:0,tr:[]},I={aim:0,drag:0,pid:0,left:0,right:0,gust:0},M={ok:0,busy:0,raw:0,floor:.014,peak:.08,an:0,td:0},O={ok:0,asked:0,gamma:0};function cl(v,a,b){return Math.max(a,Math.min(b,v))}function rn(a,b){return a+Math.random()*(b-a)}function lp(a,b,n){return a+(b-a)*n}function say(s){E.toast.textContent=s;E.toast.classList.add('on');clearTimeout(say.t);say.t=setTimeout(()=>E.toast.classList.remove('on'),1300)}function resize(){D=Math.min(2.5,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0);S=cl(Math.min(W/390,H/780),.78,1.35);P.x=W/2;P.y=H*.72;stars=Array.from({length:65},()=>({x:rn(0,W),y:rn(0,H),z:rn(.2,1),r:rn(.4,1.7)}));bg=Array.from({length:9},()=>({x:rn(-60,W+60),y:rn(0,H),s:rn(.5,1.3)*S,v:rn(18,46),a:rn(.05,.14)}))}async function micOn(){if(M.ok||M.busy)return;M.busy=1;try{let st=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}}),AC=AudioContext||webkitAudioContext,ac=new AC,src=ac.createMediaStreamSource(st);M.an=ac.createAnalyser();M.an.fftSize=1024;M.td=new Uint8Array(M.an.fftSize);src.connect(M.an);M.ok=1;say('Mic ready')}catch(e){say('Mic blocked; use GUST')}M.busy=0}async function tiltOn(){try{if(!O.asked){if(window.DeviceOrientationEvent&&typeof DeviceOrientationEvent.requestPermission==='function'){let r=await DeviceOrientationEvent.requestPermission();if(r!=='granted'){say('Tilt blocked');return}}addEventListener('deviceorientation',e=>{if(e.gamma!=null){O.gamma=cl(e.gamma,-35,35);O.ok=1}},true);O.asked=1}say('Tilt ready')}catch(e){say('Tilt unavailable')}}function readMic(dt){if(!M.ok){M.raw=0;return}M.an.getByteTimeDomainData(M.td);let s=0;for(let v of M.td){let q=(v-128)/128;s+=q*q}let r=Math.sqrt(s/M.td.length);if(r<.04)M.floor=lp(M.floor,r,dt*.55);M.peak=r>M.peak?lp(M.peak,r,.055):lp(M.peak,.075,.005);M.raw=cl((r-Math.max(.018,M.floor*1.65))/Math.max(.035,M.peak-M.floor),0,1)}function setCtrl(k){ctrl=k;localStorage.wbCtrl=k;[E.finger,E.blow,E.tilt].forEach(b=>b.classList.remove('on'));(k==='finger'?E.finger:k==='blow'?E.blow:E.tilt).classList.add('on');E.modeTxt.textContent=k==='finger'?'Fingers':k==='blow'?'Blow':'Tilt';E.mic.textContent=k==='blow'?'Enable Mic':'Mic Optional'}async function prep(){if(ctrl==='blow')await micOn();if(ctrl==='tilt')await tiltOn()}function ui(on){[E.hud,E.left,E.right,E.gust].forEach(e=>e.classList.toggle('hide',!on))}function start(pr=false){state=pr?'practice':'play';E.menu.classList.add('hide');E.over.classList.add('hide');ui(true);score=0;lives=pr?99:3;level=1;spawnO=.6;spawnR=.2;obs=[];rings=[];bits=[];P.x=W/2;P.vx=0;P.a=0;P.inv=1;P.tr=[];say(pr?'Practice: rings only':ctrl==='blow'?'Aim and blow':'Fly!')}function end(){state='over';ui(false);let s=Math.round(score);if(s>best){best=s;localStorage.wbBest3=s}E.final.textContent=s+' pts';E.summary.textContent='Best '+best;E.over.classList.remove('hide')}function aimAt(px){I.aim=cl((px-P.x)/(W*.34),-1,1)}function steer(){let a=I.aim;if(ctrl==='tilt'&&O.ok&&!I.drag&&!I.left&&!I.right)a=cl(O.gamma/25,-1,1);if(I.left)a=-1;if(I.right)a=1;if(ctrl!=='tilt'&&!I.drag&&!I.left&&!I.right)a=lp(a,0,.05);I.aim=a;return cl(a,-1,1)}function pow(){return ctrl==='blow'?cl(Math.max(M.raw,I.gust*.85),0,1):(I.gust?1:.82)}function wind(){let a=steer(),p=pow();return ctrl==='blow'?a*(.08+p*.92):a*(I.gust?1:.82)}function addRing(){rings.push({x:rn(45*S,W-45*S),y:-45*S,r:25*S,hit:0})}function addCloud(){let r=rn(26,47)*S;obs.push({k:'cloud',x:rn(r+8,W-r-8),y:-70*S,r,vx:rn(-22,22)*S})}function addGate(){let gap=cl(180*S-level*4,125*S,180*S),cx=rn(gap/2+28,W-gap/2-28);obs.push({k:'gate',cx,gap,y:-85*S,pass:0})}function addRocket(){obs.push({k:'rocket',x:rn(35*S,W-35*S),y:-90*S,r:17*S,vy:rn(420,560)*S})}function hit(){if(state!=='play'||P.inv>0)return;lives--;P.inv=1.1;say('Fold damaged');if(lives<=0)end()}function collect(r){r.hit=1;score+=120;for(let i=0;i<12;i++)bits.push({x:r.x,y:r.y,vx:rn(-100,100)*S,vy:rn(-100,70)*S,l:rn(.25,.55),c:'#ffd36a'});say('Ring +120')}function update(dt){t+=dt;readMic(dt);let w=wind();shown=lp(shown,Math.abs(w),dt*9);E.windBar.style.width=Math.round(shown*100)+'%';E.windTxt.textContent=(w<-.08?'left':w>.08?'right':'calm');level=1+score/1500;let speed=(255+Math.min(190,level*23))*S;score+=dt*(12+level*3);P.vx+=w*(980+level*30)*S*dt;P.vx=lp(P.vx,0,dt*1.65);P.x=cl(P.x+P.vx*dt,27*S,W-27*S);P.a=lp(P.a,cl(P.vx/(420*S),-.75,.75),dt*8);P.inv=Math.max(0,P.inv-dt);P.tr.push({x:P.x,y:P.y+22*S,l:.42,w:Math.abs(w)});for(let q of P.tr){q.y+=speed*.32*dt;q.l-=dt}P.tr=P.tr.filter(q=>q.l>0);spawnR-=dt;if(spawnR<0){addRing();spawnR=state==='practice'?1.15:rn(1.2,2)}if(state==='play'){spawnO-=dt;if(spawnO<0){let q=Math.random();q<.45?addGate():q<.82?addCloud():addRocket();spawnO=rn(.65,1.15)-Math.min(.25,level*.02)}}for(let o of obs){o.y+=(o.k==='rocket'?o.vy:speed)*dt;if(o.k==='cloud')o.x+=o.vx*dt;if(o.k==='gate'&&!o.pass&&o.y>P.y+30*S){o.pass=1;if(Math.abs(P.x-o.cx)<o.gap/2-20*S){score+=160;say('Clean gap')}else hit()}}for(let r of rings){r.y+=speed*dt;if(!r.hit&&Math.hypot(P.x-r.x,P.y-r.y)<r.r+17*S)collect(r)}checkHits();rings=rings.filter(r=>r.y<H+80&&!r.hit);obs=obs.filter(o=>o.y<H+180&&o.x>-120*S&&o.x<W+120*S);for(let b of bits){b.x+=b.vx*dt;b.y+=b.vy*dt;b.l-=dt}bits=bits.filter(b=>b.l>0);E.score.textContent=Math.round(score);E.life.textContent=state==='practice'?'practice':lives+' folds'}function checkHits(){if(state!=='play'||P.inv>0)return;for(let o of obs){if(o.k==='gate'&&Math.abs(o.y-P.y)<38*S&&Math.abs(P.x-o.cx)>o.gap/2-18*S)hit();else if(o.k==='cloud'&&Math.hypot(P.x-o.x,P.y-o.y)<o.r+17*S)hit();else if(o.k==='rocket'&&Math.hypot(P.x-o.x,P.y-o.y)<o.r+16*S)hit()}}function cloud(px,py,s,a,dark){x.save();x.globalAlpha=a;x.fillStyle=dark?'#314764':'#fff';x.beginPath();x.arc(px,py,23*s,0,7);x.arc(px+25*s,py-12*s,31*s,0,7);x.arc(px+58*s,py,25*s,0,7);x.rect(px-6*s,py,88*s,25*s);x.fill();x.restore()}function bgdraw(dt){let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0e2f61');g.addColorStop(.55,'#1681b2');g.addColorStop(1,'#f0b06d');x.fillStyle=g;x.fillRect(0,0,W,H);x.fillStyle='#fff6';for(let s of stars){s.y+=(250+level*20)*S*s.z*dt;if(s.y>H+4){s.y=-4;s.x=rn(0,W)}x.globalAlpha=.16+.45*s.z;x.beginPath();x.arc(s.x,s.y,s.r*s.z,0,7);x.fill()}x.globalAlpha=1;x.fillStyle='#fff3b8cc';x.beginPath();x.arc(W*.82,H*.13,34*S,0,7);x.fill();for(let c of bg){c.y+=c.v*S*dt;if(c.y>H+110*S){c.y=-110*S;c.x=rn(-60,W+60)}cloud(c.x,c.y,c.s,c.a,0)}}function drawObs(){for(let o of obs){if(o.k==='gate'){cloud(o.cx-o.gap/2-40*S,o.y,1.05*S,.96,1);cloud(o.cx+o.gap/2+10*S,o.y,1.05*S,.96,1)}else if(o.k==='cloud')cloud(o.x-o.r*.9,o.y,o.r/36,.93,1);else{x.save();x.translate(o.x,o.y);x.rotate(Math.PI);x.fillStyle='#ff617a';x.beginPath();x.moveTo(0,-24*S);x.lineTo(14*S,16*S);x.lineTo(0,9*S);x.lineTo(-14*S,16*S);x.closePath();x.fill();x.restore()}}for(let r of rings){x.strokeStyle='#ffd36a';x.lineWidth=5*S;x.beginPath();x.arc(r.x,r.y,r.r,0,7);x.stroke();x.strokeStyle='#fff8';x.lineWidth=1.5*S;x.beginPath();x.arc(r.x,r.y,r.r*.62,0,7);x.stroke()}}function plane(){for(let q of P.tr){x.globalAlpha=cl(q.l/.42,0,1)*.7;x.strokeStyle=q.w>.2?'#d7fff8':'#ffffffaa';x.lineWidth=(1.5+q.w*6)*S;x.beginPath();x.moveTo(q.x-15*S,q.y);x.quadraticCurveTo(q.x,q.y+12*S,q.x+15*S,q.y);x.stroke()}x.globalAlpha=1;x.save();x.translate(P.x,P.y);x.rotate(P.a);if(P.inv>0&&state==='play'&&Math.floor(t*18)%2===0)x.globalAlpha=.55;x.fillStyle='#f8fcff';x.strokeStyle='#06233b88';x.lineWidth=1.6*S;x.beginPath();x.moveTo(0,-34*S);x.lineTo(-27*S,25*S);x.lineTo(-4*S,8*S);x.lineTo(0,34*S);x.lineTo(4*S,8*S);x.lineTo(27*S,25*S);x.closePath();x.fill();x.stroke();x.restore();x.globalAlpha=1}function particles(){for(let b of bits){x.globalAlpha=cl(b.l/.5,0,1);x.fillStyle=b.c;x.beginPath();x.arc(b.x,b.y,2.8*S,0,7);x.fill()}x.globalAlpha=1}function arrow(){if(state!=='play'&&state!=='practice')return;let a=steer(),bx=P.x,by=P.y+72*S,len=(48+shown*70)*S,ex=bx+a*len;x.strokeStyle='rgba(255,255,255,.78)';x.lineWidth=(3+shown*4)*S;x.beginPath();x.moveTo(bx,by);x.lineTo(ex,by);x.stroke()}function render(dt){bgdraw(dt);drawObs();particles();plane();arrow();if(state==='menu'){P.y=H*.68+Math.sin(t*1.3)*10*S;P.a=Math.sin(t*1.7)*.12;plane()}}function loop(n){let dt=last?cl((n-last)/1000,0,.033):.016;last=n;if(state==='play'||state==='practice')update(dt);else t+=dt;render(dt);requestAnimationFrame(loop)}c.onpointerdown=e=>{if(state!=='play'&&state!=='practice')return;I.drag=1;I.pid=e.pointerId;aimAt(e.clientX)};c.onpointermove=e=>{if(I.drag&&e.pointerId===I.pid)aimAt(e.clientX)};c.onpointerup=c.onpointercancel=e=>{if(e.pointerId===I.pid)I.drag=0};function hold(b,k){b.onpointerdown=e=>{e.preventDefault();I[k]=1};b.onpointerup=b.onpointercancel=b.onpointerleave=()=>I[k]=0}hold(E.left,'left');hold(E.right,'right');hold(E.gust,'gust');onkeydown=e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')I.left=1;if(e.code==='ArrowRight'||e.code==='KeyD')I.right=1;if(e.code==='Space')I.gust=1};onkeyup=e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')I.left=0;if(e.code==='ArrowRight'||e.code==='KeyD')I.right=0;if(e.code==='Space')I.gust=0};E.finger.onclick=()=>setCtrl('finger');E.blow.onclick=()=>setCtrl('blow');E.tilt.onclick=async()=>{setCtrl('tilt');await tiltOn()};$('start').onclick=async()=>{await prep();start(false)};$('practice').onclick=async()=>{await prep();start(true)};E.mic.onclick=micOn;$('again').onclick=async()=>{await prep();start(false)};$('prac2').onclick=async()=>{await prep();start(true)};$('home').onclick=()=>{state='menu';E.menu.classList.remove('hide');E.over.classList.add('hide');ui(false)};setCtrl(ctrl);E.best.textContent=best;onresize=resize;resize();requestAnimationFrame(loop)})();</script></body></html>
