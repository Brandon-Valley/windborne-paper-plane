html,body{margin:0;height:100%;overflow:hidden;background:#071426;color:white;font-family:system-ui,Arial;touch-action:none;user-select:none}canvas{position:fixed;inset:0;width:100%;height:100%}.ui{position:fixed;z-index:3}.hide{display:none!important}.top{top:10px;left:10px;right:10px;display:flex;gap:8px;align-items:flex-start;justify-content:space-between;pointer-events:none}.pill{background:#071426d0;border:1px solid #fff4;border-radius:999px;padding:8px 11px;font-weight:900;box-shadow:0 8px 25px #0008}.pill small{display:block;color:#c7dcef;font-size:11px}.bar{width:132px;height:10px;background:#fff2;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#70f0c8,#ffd36a,#ff7a70)}#pauseBtn{pointer-events:auto;min-width:0;padding:9px 12px;margin:0;border-radius:999px;background:#ffffff1e;color:#fff;border:1px solid #fff4}.screen{position:fixed;inset:0;display:grid;place-items:center;z-index:9;background:radial-gradient(circle at top,#2588c855,#071426ee 55%,#000);padding:18px}.card{max-width:580px;text-align:center;background:#092044e8;border:1px solid #fff3;border-radius:26px;padding:20px;box-shadow:0 22px 80px #000b}h1{font-size:clamp(42px,13vw,68px);margin:4px 0 10px;letter-spacing:-.08em;line-height:.9}p{color:#c7dcef;font-weight:650;line-height:1.4}button{border:0;border-radius:16px;padding:13px 15px;margin:5px;min-width:150px;background:linear-gradient(#fff2b8,#ffd36a);color:#071426;font-weight:950}.secondary{background:#ffffff1e;color:#fff;border:1px solid #fff3}.choice.on{background:linear-gradient(#bfffee,#70f0c8);color:#071426}.toast{left:50%;bottom:calc(22px + env(safe-area-inset-bottom,0));transform:translateX(-50%);opacity:0;background:#071426e8;border:1px solid #fff3;border-radius:999px;padding:10px 14px;font-weight:900;white-space:nowrap}.toast.on{opacity:1}@media(max-width:430px){button{width:100%;margin:5px 0}.choice{width:auto!important;min-width:0}.card{padding:18px 15px}.top{font-size:14px}.bar{width:110px}}
</style></head><body><canvas id="cv"></canvas><div id="hud" class="ui top hide"><div class="pill"><span id="score">0</span> pts<small id="life">3 folds</small></div><div class="pill"><span id="modeTxt">Fingers</span><small id="windTxt">calm</small><div class="bar"><i id="windBar"></i></div></div><button id="pauseBtn">Pause</button></div><div id="toast" class="ui toast"></div><div id="menu" class="screen"><div class="card"><h1>Windborne</h1><h2>Sky Run</h2><p>Practice is safe: rings only, no rain-cloud obstacles. Pick a control mode before flying.</p><button id="finger" class="secondary choice">Fingers Only</button><button id="blow" class="secondary choice">Blow + Fingers</button><button id="tilt" class="secondary choice">Tilt Phone</button><button id="swipe" class="secondary choice">Swipe Gust</button><button id="start">Start Flight</button><button id="practice" class="secondary">Practice</button><button id="mic" class="secondary">Enable Mic</button><p>Best: <b id="best">0</b></p></div></div><div id="over" class="screen hide"><div class="card"><h1 id="final">0</h1><h2 id="overTitle">Flight ended</h2><p id="summary">Nice run.</p><button id="resume" class="secondary hide">Resume</button><button id="again">Fly Again</button><button id="prac2" class="secondary">Practice</button><button id="home" class="secondary">Menu</button></div></div><script>
(()=>{'use strict';const $=id=>document.getElementById(id),cv=$('cv'),ctx=cv.getContext('2d'),D={hud:$('hud'),score:$('score'),life:$('life'),modeTxt:$('modeTxt'),windTxt:$('windTxt'),windBar:$('windBar'),menu:$('menu'),over:$('over'),toast:$('toast'),best:$('best'),final:$('final'),overTitle:$('overTitle'),summary:$('summary'),finger:$('finger'),blow:$('blow'),tilt:$('tilt'),swipe:$('swipe'),mic:$('mic'),pause:$('pauseBtn'),resume:$('resume'),again:$('again'),prac2:$('prac2'),home:$('home')};let W=0,H=0,R=1,S=1,last=0,t=0,state='menu',beforePause='play',ctrl=localStorage.wbCtrl||'finger',best=+localStorage.wbBest4||0,score=0,lives=3,level=1,spawnO=0,spawnR=0,shown=0,windNow=0,stars=[],bg=[],obs=[],rings=[],bits=[];const P={x:0,y:0,vx:0,a:0,inv:0,tr:[]},I={aim:0,drag:0,pid:0,sx:0,st:0,lastX:0,left:0,right:0,sw:0},M={ok:0,busy:0,raw:0,floor:.014,peak:.08,an:0,td:0},O={ok:0,asked:0,gamma:0};function cl(v,a,b){return Math.max(a,Math.min(b,v))}function rn(a,b){return a+Math.random()*(b-a)}function lp(a,b,n){return a+(b-a)*n}function say(s){D.toast.textContent=s;D.toast.classList.add('on');clearTimeout(say.t);say.t=setTimeout(()=>D.toast.classList.remove('on'),1500)}function resize(){R=Math.min(2.5,devicePixelRatio||1);W=innerWidth;H=innerHeight;cv.width=W*R;cv.height=H*R;ctx.setTransform(R,0,0,R,0,0);S=cl(Math.min(W/390,H/780),.78,1.35);P.x=W/2;P.y=H*.72;stars=Array.from({length:70},()=>({x:rn(0,W),y:rn(0,H),z:rn(.2,1),r:rn(.4,1.7)}));bg=Array.from({length:9},()=>({x:rn(-60,W+60),y:rn(0,H),s:rn(.5,1.3)*S,v:rn(18,46),a:rn(.05,.14)}))}async function micOn(){if(M.ok||M.busy)return;M.busy=1;try{let get=navigator.mediaDevices&&navigator.mediaDevices.getUserMedia;if(!get)throw Error('no mic');let st=await get.call(navigator.mediaDevices,{audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}}),AC=window.AudioContext||window.webkitAudioContext,ac=new AC,src=ac.createMediaStreamSource(st);M.an=ac.createAnalyser();M.an.fftSize=1024;M.td=new Uint8Array(M.an.fftSize);src.connect(M.an);M.ok=1;say('Mic ready: blow to move in Blow mode')}catch(e){say('Mic blocked. Blow mode will not steer until mic works.')}M.busy=0}async function tiltOn(){try{if(!O.asked){if(window.DeviceOrientationEvent&&typeof DeviceOrientationEvent.requestPermission==='function'){let r=await DeviceOrientationEvent.requestPermission();if(r!=='granted'){say('Tilt blocked');return}}addEventListener('deviceorientation',e=>{if(e.gamma!=null){O.gamma=cl(e.gamma,-35,35);O.ok=1}},true);O.asked=1}say('Tilt ready: lean left/right')}catch(e){say('Tilt unavailable')}}function readMic(dt){if(!M.ok){M.raw=0;return}M.an.getByteTimeDomainData(M.td);let sum=0;for(let v of M.td){let q=(v-128)/128;sum+=q*q}let r=Math.sqrt(sum/M.td.length);if(r<.04)M.floor=lp(M.floor,r,dt*.6);M.peak=r>M.peak?lp(M.peak,r,.06):lp(M.peak,.075,.005);M.raw=cl((r-Math.max(.018,M.floor*1.65))/Math.max(.035,M.peak-M.floor),0,1)}function setCtrl(k){ctrl=k;localStorage.wbCtrl=k;[D.finger,D.blow,D.tilt,D.swipe].forEach(b=>b.classList.remove('on'));({finger:D.finger,blow:D.blow,tilt:D.tilt,swipe:D.swipe}[k]).classList.add('on');D.modeTxt.textContent=k==='finger'?'Fingers':k==='blow'?'Blow':k==='tilt'?'Tilt':'Swipe';D.mic.textContent=k==='blow'?'Enable Mic':'Mic Optional'}async function prep(){if(ctrl==='blow')await micOn();if(ctrl==='tilt')await tiltOn()}function ui(on){D.hud.classList.toggle('hide',!on)}function begin(practice=false){state=practice?'practice':'play';D.menu.classList.add('hide');D.over.classList.add('hide');D.resume.classList.add('hide');ui(true);score=0;lives=practice?99:3;level=1;spawnO=.65;spawnR=.25;shown=0;windNow=0;obs=[];rings=[];bits=[];P.x=W/2;P.vx=0;P.a=0;P.inv=1;P.tr=[];I.sw=0;say(practice?'Practice: rings only':ctrl==='blow'?'Blow required to move':'Fly!')}function showEnd(title,paused=false){ui(false);D.final.textContent=Math.round(score)+' pts';D.overTitle.textContent=title;D.summary.textContent=(paused?'Paused':'Best '+best)+' • Mode: '+D.modeTxt.textContent+' • Folds: '+(state==='practice'?'practice':lives);D.resume.classList.toggle('hide',!paused);D.again.textContent=paused?'Restart Flight':'Fly Again';D.over.classList.remove('hide')}function pause(){if(state!=='play'&&state!=='practice')return;beforePause=state;state='pause';showEnd('Paused',true)}function resume(){if(state!=='pause')return;state=beforePause;D.over.classList.add('hide');ui(true);last=0;say('Resumed')}function end(){state='over';let s=Math.round(score);if(s>best){best=s;localStorage.wbBest4=s;D.best.textContent=best}showEnd(s===best?'New Best!':'Flight ended',false)}function aimAt(px){I.aim=cl((px-P.x)/(W*.34),-1,1)}function steer(){let a=I.aim;if(ctrl==='tilt'&&O.ok&&!I.drag)a=cl(O.gamma/25,-1,1);if(ctrl==='swipe')a=I.sw;if(ctrl!=='tilt'&&ctrl!=='swipe'&&!I.drag)a=lp(a,0,.05);I.aim=a;return cl(a,-1,1)}function wind(){let a=steer();if(ctrl==='blow'){let p=cl(M.raw,0,1);return p>.08?a*p:0}if(ctrl==='swipe')return I.sw;return a*.82}function addRing(){rings.push({x:rn(45*S,W-45*S),y:-45*S,r:25*S,hit:0})}function addCloud(){let r=rn(26,47)*S;obs.push({k:'cloud',x:rn(r+8,W-r-8),y:-70*S,r,vx:rn(-22,22)*S})}function addGate(){let gap=cl(180*S-level*4,125*S,180*S),cx=rn(gap/2+28,W-gap/2-28);obs.push({k:'gate',cx,gap,y:-85*S,pass:0})}function addRocket(){obs.push({k:'rocket',x:rn(35*S,W-35*S),y:-90*S,r:17*S,vy:rn(420,560)*S})}function hit(){if(state!=='play'||P.inv>0)return;lives--;P.inv=1.1;say('Fold damaged');if(lives<=0)end()}function collect(r){r.hit=1;score+=120;for(let i=0;i<14;i++)bits.push({x:r.x,y:r.y,vx:rn(-110,110)*S,vy:rn(-100,80)*S,l:rn(.25,.6),c:'#ffd36a'});say('Ring +120')}function update(dt){t+=dt;readMic(dt);if(ctrl==='swipe')I.sw=lp(I.sw,0,dt*2.8);let w=wind();windNow=w;shown=lp(shown,ctrl==='blow'?Math.max(Math.abs(w),M.raw):Math.abs(w),dt*9);D.windBar.style.width=Math.round(cl(shown,0,1)*100)+'%';D.windTxt.textContent=ctrl==='blow'&&M.raw<.08?'blow to move':w<-.08?'left':w>.08?'right':'calm';level=1+score/1500;let speed=(255+Math.min(190,level*23))*S;score+=dt*(12+level*3);P.vx+=w*(1000+level*30)*S*dt;P.vx=lp(P.vx,0,dt*1.65);P.x=cl(P.x+P.vx*dt,27*S,W-27*S);P.a=lp(P.a,cl(P.vx/(420*S),-.75,.75),dt*8);P.inv=Math.max(0,P.inv-dt);P.tr.push({x:P.x,y:P.y+22*S,l:.42,w:Math.abs(w)});for(let q of P.tr){q.y+=speed*.32*dt;q.l-=dt}P.tr=P.tr.filter(q=>q.l>0);if(Math.abs(w)>.1)for(let i=0;i<2;i++)bits.push({x:P.x-w*34*S+rn(-8,8)*S,y:P.y+rn(-16,18)*S,vx:-w*rn(90,180)*S,vy:rn(70,170)*S,l:rn(.18,.34),c:'#ccfff4'});spawnR-=dt;if(spawnR<0){addRing();spawnR=state==='practice'?1.15:rn(1.2,2)}if(state==='play'){spawnO-=dt;if(spawnO<0){let q=Math.random();q<.45?addGate():q<.82?addCloud():addRocket();spawnO=rn(.65,1.15)-Math.min(.25,level*.02)}}for(let o of obs){o.y+=(o.k==='rocket'?o.vy:speed)*dt;if(o.k==='cloud')o.x+=o.vx*dt;if(o.k==='gate'&&!o.pass&&o.y>P.y+30*S){o.pass=1;if(Math.abs(P.x-o.cx)<o.gap/2-20*S){score+=160;say('Clean gap')}else hit()}}for(let r of rings){r.y+=speed*dt;if(!r.hit&&Math.hypot(P.x-r.x,P.y-r.y)<r.r+17*S)collect(r)}checkHits();rings=rings.filter(r=>r.y<H+80&&!r.hit);obs=obs.filter(o=>o.y<H+180&&o.x>-120*S&&o.x<W+120*S);for(let b of bits){b.x+=b.vx*dt;b.y+=b.vy*dt;b.l-=dt}bits=bits.filter(b=>b.l>0);D.score.textContent=Math.round(score);D.life.textContent=state==='practice'?'practice':lives+' folds'}function checkHits(){if(state!=='play'||P.inv>0)return;for(let o of obs){if(o.k==='gate'&&Math.abs(o.y-P.y)<38*S&&Math.abs(P.x-o.cx)>o.gap/2-18*S)hit();else if(o.k==='cloud'&&Math.hypot(P.x-o.x,P.y-o.y)<o.r+17*S)hit();else if(o.k==='rocket'&&Math.hypot(P.x-o.x,P.y-o.y)<o.r+16*S)hit()}}function cloud(px,py,s,a,dark){ctx.save();ctx.globalAlpha=a;ctx.fillStyle=dark?'#314764':'#fff';ctx.beginPath();ctx.arc(px,py,23*s,0,7);ctx.arc(px+25*s,py-12*s,31*s,0,7);ctx.arc(px+58*s,py,25*s,0,7);ctx.rect(px-6*s,py,88*s,25*s);ctx.fill();ctx.restore()}function bgdraw(dt){let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0e2f61');g.addColorStop(.55,'#1681b2');g.addColorStop(1,'#f0b06d');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff6';for(let s of stars){s.y+=(250+level*20)*S*s.z*dt;if(s.y>H+4){s.y=-4;s.x=rn(0,W)}ctx.globalAlpha=.16+.45*s.z;ctx.beginPath();ctx.arc(s.x,s.y,s.r*s.z,0,7);ctx.fill()}ctx.globalAlpha=1;ctx.fillStyle='#fff3b8cc';ctx.beginPath();ctx.arc(W*.82,H*.13,34*S,0,7);ctx.fill();for(let c of bg){c.y+=c.v*S*dt;if(c.y>H+110*S){c.y=-110*S;c.x=rn(-60,W+60)}cloud(c.x,c.y,c.s,c.a,0)}}function drawObs(){for(let o of obs){if(o.k==='gate'){cloud(o.cx-o.gap/2-40*S,o.y,1.05*S,.96,1);cloud(o.cx+o.gap/2+10*S,o.y,1.05*S,.96,1)}else if(o.k==='cloud')cloud(o.x-o.r*.9,o.y,o.r/36,.93,1);else{ctx.save();ctx.translate(o.x,o.y);ctx.rotate(Math.PI);ctx.fillStyle='#ff617a';ctx.beginPath();ctx.moveTo(0,-24*S);ctx.lineTo(14*S,16*S);ctx.lineTo(0,9*S);ctx.lineTo(-14*S,16*S);ctx.closePath();ctx.fill();ctx.restore()}}for(let r of rings){ctx.strokeStyle='#ffd36a';ctx.lineWidth=5*S;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,7);ctx.stroke();ctx.strokeStyle='#fff8';ctx.lineWidth=1.5*S;ctx.beginPath();ctx.arc(r.x,r.y,r.r*.62,0,7);ctx.stroke()}}function plane(){for(let q of P.tr){ctx.globalAlpha=cl(q.l/.42,0,1)*.7;ctx.strokeStyle=q.w>.2?'#d7fff8':'#ffffffaa';ctx.lineWidth=(1.5+q.w*6)*S;ctx.beginPath();ctx.moveTo(q.x-15*S,q.y);ctx.quadraticCurveTo(q.x,q.y+12*S,q.x+15*S,q.y);ctx.stroke()}ctx.globalAlpha=1;ctx.save();ctx.translate(P.x,P.y);ctx.rotate(P.a);if(P.inv>0&&state==='play'&&Math.floor(t*18)%2===0)ctx.globalAlpha=.55;ctx.fillStyle='#f8fcff';ctx.strokeStyle='#06233b88';ctx.lineWidth=1.6*S;ctx.beginPath();ctx.moveTo(0,-34*S);ctx.lineTo(-27*S,25*S);ctx.lineTo(-4*S,8*S);ctx.lineTo(0,34*S);ctx.lineTo(4*S,8*S);ctx.lineTo(27*S,25*S);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();ctx.globalAlpha=1}function particles(){for(let b of bits){ctx.globalAlpha=cl(b.l/.5,0,1);ctx.fillStyle=b.c;ctx.beginPath();ctx.arc(b.x,b.y,2.8*S,0,7);ctx.fill()}ctx.globalAlpha=1}function arrow(){if(state!=='play'&&state!=='practice')return;let a=steer(),bx=P.x,by=P.y+72*S,len=(48+shown*70)*S,ex=bx+a*len;ctx.strokeStyle='rgba(255,255,255,.78)';ctx.lineWidth=(3+shown*4)*S;ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(ex,by);ctx.stroke()}function render(dt){bgdraw(dt);drawObs();particles();plane();arrow();if(state==='menu'){P.y=H*.68+Math.sin(t*1.3)*10*S;P.a=Math.sin(t*1.7)*.12;plane()}}function loop(n){let dt=last?cl((n-last)/1000,0,.033):.016;last=n;if(state==='play'||state==='practice')update(dt);else t+=dt;render(dt);requestAnimationFrame(loop)}cv.onpointerdown=e=>{if(state!=='play'&&state!=='practice')return;I.drag=1;I.pid=e.pointerId;I.sx=e.clientX;I.st=performance.now();I.lastX=e.clientX;aimAt(e.clientX)};cv.onpointermove=e=>{if(I.drag&&e.pointerId===I.pid){I.lastX=e.clientX;if(ctrl!=='swipe')aimAt(e.clientX)}};cv.onpointerup=cv.onpointercancel=e=>{if(e.pointerId!==I.pid)return;if(ctrl==='swipe'){let dt=Math.max(80,performance.now()-I.st),dx=e.clientX-I.sx;I.sw=cl(dx/dt*1.9,-1,1);say(Math.abs(I.sw)>.2?'Swipe gust!':'Longer swipe for gust')}else aimAt(e.clientX);I.drag=0};onkeydown=e=>{if(e.code==='KeyP')pause()};D.pause.onclick=pause;D.resume.onclick=resume;D.finger.onclick=()=>setCtrl('finger');D.blow.onclick=()=>setCtrl('blow');D.tilt.onclick=async()=>{setCtrl('tilt');await tiltOn()};D.swipe.onclick=()=>{setCtrl('swipe');say('Flick left/right to gust')};$('start').onclick=async()=>{await prep();begin(false)};$('practice').onclick=async()=>{await prep();begin(true)};D.mic.onclick=micOn;D.again.onclick=async()=>{D.over.classList.add('hide');await prep();begin(false)};D.prac2.onclick=async()=>{D.over.classList.add('hide');await prep();begin(true)};D.home.onclick=()=>{state='menu';D.menu.classList.remove('hide');D.over.classList.add('hide');ui(false)};setCtrl(['finger','blow','tilt','swipe'].includes(ctrl)?ctrl:'finger');D.best.textContent=best;onresize=resize;resize();requestAnimationFrame(loop)})();
</script></body></html>
