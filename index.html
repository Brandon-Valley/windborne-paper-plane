<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"><title>Windborne</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#071426;color:white;font-family:system-ui,Arial;touch-action:none;user-select:none}canvas{position:fixed;inset:0;width:100%;height:100%}.ui{position:fixed;z-index:3}.top{top:12px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none}.pill{background:#071426aa;border:1px solid #fff3;border-radius:999px;padding:8px 11px;font-weight:800;box-shadow:0 8px 24px #0005}.bar{height:10px;width:160px;background:#fff2;border-radius:999px;overflow:hidden;margin-top:5px}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#70f0c8,#89d8ff,#ffd36a,#ff8a70)}.screen{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at top,#2485bb55,#071426ee 55%,#000);z-index:8;padding:18px}.hide{display:none}.card{max-width:560px;text-align:center;background:#092044dd;border:1px solid #fff3;border-radius:28px;padding:24px;box-shadow:0 25px 80px #0008}h1{font-size:58px;line-height:.9;margin:5px 0 12px;letter-spacing:-4px}p{color:#c2d8ee;font-weight:650;line-height:1.4}button{border:0;border-radius:17px;padding:14px 16px;margin:5px;min-width:180px;background:linear-gradient(#fff2b8,#ffd36a);color:#071426;font-weight:900;font-size:16px}.secondary{background:#ffffff20;color:white;border:1px solid #fff3}.danger{background:#ff6b7a44;color:white;border:1px solid #ff6b7a99}#gust{right:16px;bottom:18px;width:78px;height:78px;border-radius:50%;min-width:0;display:none;color:white;background:radial-gradient(circle at 35% 25%,#fff6,#70f0c830,#071426cc);border:1px solid #fff4;z-index:4}#teach{left:12px;right:12px;bottom:12px;text-align:left;display:none;background:#071426d9;border:1px solid #fff3;border-radius:20px;padding:13px;box-shadow:0 15px 50px #0008}.toast{left:50%;bottom:112px;transform:translateX(-50%);opacity:0;background:#071426dd;border:1px solid #fff3;border-radius:999px;padding:10px 14px;font-weight:900}.toast.on{opacity:1}@media(max-width:430px){h1{font-size:48px}button{width:100%;margin:5px 0}}</style></head><body><canvas id="c"></canvas><div id="hud" class="ui top hide"><div class="pill"><span id="sc">0</span> pts<br><span id="hp">hearts 3</span></div><div class="pill"><span id="wt">wind calm</span><div class="bar"><i id="wf"></i></div></div></div><button id="gust" class="ui">Silent<br>Gust</button><div id="toast" class="ui toast"></div><div id="teach" class="ui"><b id="tt">Training</b><p id="tx">Learn controls.</p><button id="next" class="secondary">Next</button><button id="skip" class="secondary">Skip</button></div><div id="menu" class="screen"><div class="card"><h1>Windborne</h1><p>Fly a paper airplane through mythic skies. Drag to aim the wind. Blow into your phone to control gust strength. Dodge clouds and birds. Collect rings.</p><button id="start">Start Flight</button><button id="train" class="secondary">Tutorial and Blow Training</button><button id="mic" class="secondary">Enable Microphone</button><p id="best">Best: 0</p></div></div><div id="over" class="screen hide"><div class="card"><h1 id="final">0</h1><p id="endtext">Flight ended.</p><button id="again">Fly Again</button><button id="prac" class="secondary">Practice</button><button id="home" class="secondary">Menu</button></div></div><script>(()=>{const C=c,ctx=C.getContext('2d'),E=id=>document.getElementById(id);let W,H,D,S,last,mode='menu',score=0,best=+localStorage.wbBest||0,hp=3,time=0,power=0,shown=0,fall=0,ob=[],rings=[],pt=[],clouds=[],nO=1,nB=5,nR=2,step=0,hold=0;const P={x:100,y:300,vx:0,vy:0,a:0,inv:0},I={aim:0,id:0,sx:0,sy:0,wx:.25,wy:-.97,len:0,key:0,btn:0},M={ok:0,busy:0,raw:0,floor:.014,peak:.08,an:0,td:0,fd:0};const T=[['Aim the wind','Drag anywhere. The arrow points where wind pushes the plane.','drag'],['Soft breeze','Blow gently and keep the meter below half.','soft'],['Hard gust','Blow hard or hold Silent Gust.','hard'],['Rings','Fly through three rings.','rings'],['Ready','Training done. Starting flight.','done']];function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function rnd(a,b){return a+Math.random()*(b-a)}function lerp(a,b,t){return a+(b-a)*t}function toast(s){E('toast').textContent=s;E('toast').classList.add('on');clearTimeout(toast.t);toast.t=setTimeout(()=>E('toast').classList.remove('on'),1600)}function rs(){D=Math.min(2.5,devicePixelRatio||1);W=innerWidth;H=innerHeight;C.width=W*D;C.height=H*D;ctx.setTransform(D,0,0,D,0,0);S=clamp(Math.min(W/390,H/760),.8,1.3);clouds=[];for(let i=0;i<12;i++)clouds.push({x:rnd(0,W),y:rnd(50,H*.75),s:rnd(.6,1.5)*S,v:rnd(8,24),a:rnd(.07,.18)})}async function startMic(){if(M.ok||M.busy)return;M.busy=1;try{let st=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}}),AC=AudioContext||webkitAudioContext,ac=new AC,src=ac.createMediaStreamSource(st);M.an=ac.createAnalyser();M.an.fftSize=1024;src.connect(M.an);M.td=new Uint8Array(M.an.fftSize);M.fd=new Uint8Array(M.an.frequencyBinCount);M.ok=1;toast('Mic ready. Blow for wind.')}catch(e){toast('Mic blocked. Use Silent Gust.')}M.busy=0}function read(dt){if(!M.ok){M.raw=0;return}M.an.getByteTimeDomainData(M.td);let s=0;for(let v of M.td){let x=(v-128)/128;s+=x*x}let r=Math.sqrt(s/M.td.length);if(r<.03)M.floor=lerp(M.floor,r,dt*.5);M.peak=r>M.peak?lerp(M.peak,r,.05):lerp(M.peak,.07,.004);M.raw=clamp((r-Math.max(.018,M.floor*1.7))/Math.max(.045,M.peak-M.floor),0,1)}function newGame(tr){mode=tr?'train':'play';menu.classList.add('hide');over.classList.add('hide');hud.classList.remove('hide');gust.style.display='block';teach.style.display=tr?'block':'none';score=0;hp=tr?99:3;time=0;ob=[];rings=[];pt=[];nO=1;nB=5;nR=2;step=0;hold=0;P.x=W*.28;P.y=H*.45;P.vx=25*S;P.vy=-15*S;P.inv=1;setT();toast('Drag to aim. Blow for power.')}function end(){mode='over';hud.classList.add('hide');gust.style.display='none';teach.style.display='none';let s=Math.round(score);if(s>best){best=s;localStorage.wbBest=s}final.textContent=s+' pts';endtext.textContent='Best '+best+' points';over.classList.remove('hide')}function setT(){tt.textContent=T[step][0];tx.textContent=T[step][1]}function gate(){let d=clamp(time/80,0,1),gap=lerp(H*.36,H*.25,d),y=rnd(H*.2+gap*.3,H*.8-gap*.3);ob.push({k:'g',x:W+70,w:90*S,y,gap,pass:0})}function bird(){ob.push({k:'b',x:W+50,y:rnd(H*.2,H*.75),r:18*S,t:rnd(0,6)})}function ring(pr){rings.push({x:W+rnd(110,200),y:rnd(H*.25,H*.7),r:(pr?33:24)*S,pr})}function hit(){if(mode==='train'||P.inv>0)return;hp--;P.inv=1.2;E('hp').textContent='hearts '+hp;toast('Ouch. One fold lost.');if(hp<=0)end()}function game(dt){time+=dt;let d=clamp(time/80,0,1),speed=lerp(175,310,d)*S;score+=dt*(10+20*d);E('sc').textContent=Math.round(score);let acc=(700+250*d)*S*power;P.vx+=I.wx*acc*dt;P.vy+=I.wy*acc*dt+260*S*dt;P.vx=lerp(P.vx,25*S,dt*1.3);P.vy=lerp(P.vy,0,dt*.15);P.x=clamp(P.x+P.vx*dt,W*.12,W*.78);P.y+=P.vy*dt;P.a=lerp(P.a,clamp(Math.atan2(P.vy,220*S),-.9,1),dt*8);P.inv=Math.max(0,P.inv-dt);if(P.y<35*S||P.y>H-35*S){P.y=clamp(P.y,35*S,H-35*S);P.vy*=-.25;hit()}if(power>.12)pt.push({x:P.x-25*S,y:P.y+rnd(-8,8),vx:-I.wx*rnd(90,170)*S,vy:-I.wy*rnd(90,170)*S,l:.45});nO-=dt;nB-=dt;nR-=dt;if(mode==='play'){if(nO<0){gate();nO=rnd(1.4,2.1)-d*.35}if(nB<0&&time>8){bird();nB=rnd(4,7)-d}if(nR<0){ring(0);nR=rnd(2.5,4)}}else trainStep(dt);for(let o of ob){o.x-=speed*dt;if(o.k==='b'){o.t+=dt*7;o.y+=Math.sin(o.t)*45*dt}}ob=ob.filter(o=>o.x>-150);for(let r of rings)r.x-=speed*dt;rings=rings.filter(r=>r.x>-80&&!r.dead);for(let r of rings)if(!r.dead&&Math.hypot(P.x-r.x,P.y-r.y)<r.r+14*S){r.dead=1;score+=r.pr?0:100;toast(r.pr?'Ring':'Laurel +100')}for(let o of ob){if(o.k==='g'){let inside=P.x+16*S>o.x&&P.x-16*S<o.x+o.w;if(inside&&(P.y<o.y-o.gap/2||P.y>o.y+o.gap/2))hit();if(!o.pass&&o.x+o.w<P.x){o.pass=1;score+=120;toast('Clean gate')}}else if(Math.hypot(P.x-o.x,P.y-o.y)<o.r+14*S)hit()}for(let p of pt){p.x+=p.vx*dt;p.y+=p.vy*dt;p.l-=dt}pt=pt.filter(p=>p.l>0)}function trainStep(dt){let g=T[step][2];if(g==='drag'){hold=I.len>60?hold+dt:0;if(hold>.45)nextT()}if(g==='soft'){hold=shown>.18&&shown<.62?hold+dt:0;if(hold>.8)nextT()}if(g==='hard'){hold=shown>.72?hold+dt:0;if(hold>.45)nextT()}if(g==='rings'){if(!rings.length)for(let i=0;i<3;i++)rings.push({x:W+160+i*W*.55,y:H*(.34+.16*(i%2)),r:33*S,pr:1});hold=(3-rings.filter(r=>!r.dead).length)/3;if(hold>=1)nextT()}if(g==='done'){hold+=dt;if(hold>2)newGame(0)}}function nextT(){step=Math.min(step+1,T.length-1);hold=0;setT()}function cloud(x,y,s,a,dark){ctx.save();ctx.globalAlpha=a;ctx.fillStyle=dark?'#34445f':'white';ctx.beginPath();ctx.arc(x,y,23*s,0,7);ctx.arc(x+25*s,y-12*s,30*s,0,7);ctx.arc(x+58*s,y,25*s,0,7);ctx.rect(x-5*s,y,90*s,25*s);ctx.fill();ctx.restore()}function draw(){let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#123f72');g.addColorStop(.55,'#1b79ab');g.addColorStop(1,'#f3bd72');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff3bbaa';ctx.beginPath();ctx.arc(W*.8,H*.15,34*S,0,7);ctx.fill();for(let c of clouds){c.x-=c.v*.016*S;if(c.x<-120*c.s)c.x=W+120;cloud(c.x,c.y,c.s,c.a,0)}for(let r of rings){ctx.lineWidth=(r.pr?5:4)*S;ctx.strokeStyle=r.pr?'#70f0c8':'#ffd36a';ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,7);ctx.stroke()}for(let o of ob){if(o.k==='g'){for(let y=-30;y<o.y-o.gap/2;y+=45*S)cloud(o.x,y,S,.95,1);for(let y=o.y+o.gap/2;y<H+40;y+=45*S)cloud(o.x,y,S,.95,1)}else{ctx.strokeStyle='#1c2234';ctx.lineWidth=4*S;ctx.beginPath();ctx.moveTo(o.x-o.r,o.y);ctx.quadraticCurveTo(o.x,o.y-o.r-Math.sin(o.t)*8*S,o.x+o.r,o.y);ctx.stroke()}}ctx.strokeStyle='white';ctx.lineWidth=2*S;for(let p of pt){ctx.globalAlpha=Math.max(0,p.l/.45);ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.quadraticCurveTo(p.x+12*S,p.y-4*S,p.x+25*S,p.y);ctx.stroke()}ctx.globalAlpha=1;plane();arrow();if(mode==='menu'){P.x=W*.28+Math.sin(time*.8)*16*S;P.y=H*.4+Math.sin(time*1.2)*25*S;plane()}}function plane(){ctx.save();ctx.translate(P.x,P.y);ctx.rotate(P.a);if(P.inv>0&&mode==='play'&&Math.floor(time*16)%2===0)ctx.globalAlpha=.55;ctx.fillStyle='#f7fbff';ctx.strokeStyle='#07142680';ctx.lineWidth=1.5*S;ctx.beginPath();ctx.moveTo(31*S,0);ctx.lineTo(-29*S,-18*S);ctx.lineTo(-10*S,2*S);ctx.lineTo(-29*S,18*S);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore()}function arrow(){if(mode!=='play'&&mode!=='train')return;let x=I.aim?I.sx:W*.17,y=I.aim?I.sy:H*.82,len=I.aim?clamp(I.len,45,155*S):60*S,ex=x+I.wx*len,ey=y+I.wy*len,a=Math.atan2(I.wy,I.wx);ctx.strokeStyle='#ffffffcc';ctx.lineWidth=(4+shown*5)*S;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(ex,ey);ctx.stroke();ctx.save();ctx.translate(ex,ey);ctx.rotate(a);ctx.fillStyle='white';ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-16*S,-9*S);ctx.lineTo(-12*S,0);ctx.lineTo(-16*S,9*S);ctx.fill();ctx.restore()}function aim(x,y){let dx=x-I.sx,dy=y-I.sy,l=Math.hypot(dx,dy);I.len=l;if(l>10){I.wx=dx/l;I.wy=dy/l}}function loop(now){if(!last)last=now;let dt=clamp((now-last)/1000,0,.033);last=now;if(mode==='menu')time+=dt;read(dt);let target=(I.key||I.btn)?0.86:0;fall=lerp(fall,target,target?dt*7:dt*4);power=lerp(power,Math.max(M.raw,fall),dt*8);shown=lerp(shown,power,dt*12);wf.style.width=Math.round(shown*100)+'%';wt.textContent=(fall>M.raw+.05?'silent gust':shown>.65?'hard gust':shown>.2?'breeze':'wind calm')+' '+Math.round(shown*100)+'%';if(mode==='play'||mode==='train')game(dt);draw();requestAnimationFrame(loop)}onresize=rs;C.onpointerdown=e=>{if(mode!=='play'&&mode!=='train')return;I.aim=1;I.id=e.pointerId;I.sx=e.clientX;I.sy=e.clientY;I.len=0};C.onpointermove=e=>{if(I.aim&&e.pointerId===I.id)aim(e.clientX,e.clientY)};C.onpointerup=C.onpointercancel=e=>{if(e.pointerId===I.id){aim(e.clientX,e.clientY);I.aim=0}};start.onclick=async()=>{await startMic();newGame(0)};train.onclick=async()=>{await startMic();newGame(1)};mic.onclick=startMic;again.onclick=()=>newGame(0);prac.onclick=async()=>{await startMic();newGame(1)};home.onclick=()=>{mode='menu';menu.classList.remove('hide');over.classList.add('hide');hud.classList.add('hide');gust.style.display='none';teach.style.display='none'};skip.onclick=()=>newGame(0);next.onclick=()=>step>=T.length-1?newGame(0):nextT();gust.onpointerdown=e=>{e.preventDefault();I.btn=1};gust.onpointerup=gust.onpointercancel=()=>{I.btn=0};onkeydown=e=>{if(e.code==='Space')I.key=1};onkeyup=e=>{if(e.code==='Space')I.key=0};E('best').textContent='Best: '+best;rs();requestAnimationFrame(loop)})();</script></body></html>
